<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍄</text></svg>">
  <title>Community Monitor — Mycelium Protocol</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --bg: #020617;
      --cyan: #22d3ee;
      --blue: #3b82f6;
      --green: #4ade80;
      --yellow: #fbbf24;
      --orange: #fb923c;
      --purple: #a78bfa;
      --red: #f87171;
      --glass: rgba(15,23,42,0.8);
      --border: rgba(34,211,238,0.25);
    }
    body { background: var(--bg); color: #f8fafc; font-family: 'Segoe UI', system-ui, sans-serif; overflow-x: hidden; }
    .bg-grid {
      position: fixed; top:0; left:0; width:100%; height:100%; z-index:-1;
      background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 50px 50px;
      mask-image: radial-gradient(circle at 50% 30%, black, transparent 75%);
      opacity: 0.12;
    }
    .glass { border:1px solid var(--border); background:var(--glass); backdrop-filter:blur(10px); border-radius:12px; transition:all 0.3s; }
    .glass:hover { border-color:var(--cyan); box-shadow:0 0 20px rgba(34,211,238,0.1); }
    .metric-card { border:1px solid rgba(255,255,255,0.08); background:rgba(30,41,59,0.5); border-radius:10px; transition:all 0.2s; }
    .metric-card:hover { border-color:var(--cyan); background:rgba(30,41,59,0.8); }
    .status-dot { width:8px; height:8px; border-radius:50%; display:inline-block; margin-right:6px; }
    .s-active  { background:var(--green);  box-shadow:0 0 6px var(--green); }
    .s-beta    { background:var(--yellow); box-shadow:0 0 6px var(--yellow); }
    .s-draft   { background:var(--blue);   box-shadow:0 0 6px var(--blue); }
    .s-research{ background:var(--purple); box-shadow:0 0 4px var(--purple); }
    .s-planned { background:#475569; }
    .tag { display:inline-block; padding:2px 8px; border-radius:20px; font-size:0.68rem; font-weight:600; letter-spacing:0.06em; text-transform:uppercase; }
    .product-row { border-bottom:1px solid rgba(255,255,255,0.05); transition:background 0.15s; }
    .product-row:last-child { border-bottom:none; }
    .product-row:hover { background:rgba(34,211,238,0.03); }
    .section-title { font-size:1.2rem; font-weight:700; margin-bottom:0.25rem; }
    .nav-link { color:#94a3b8; font-size:0.85rem; transition:color 0.2s; }
    .nav-link:hover { color:var(--cyan); }
    .divider { height:1px; background:linear-gradient(to right, transparent, var(--border), transparent); }
    .sponsor-placeholder { border:1px dashed rgba(255,255,255,0.15); border-radius:8px; padding:1rem; text-align:center; color:#475569; font-size:0.8rem; }
    .number { font-family:'Courier New', monospace; font-weight:700; }
    .pulse { animation: pulse-glow 2s infinite; }
    @keyframes pulse-glow { 0%,100%{opacity:1} 50%{opacity:0.6} }
  </style>
</head>
<body>
