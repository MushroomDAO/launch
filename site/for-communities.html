            href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍄</text></svg>"

        <title>为社区而生 · Mycelium Protocol</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
        />
        <style>
            :root {
                --bg-color: #020617;
                --primary-cyan: #22d3ee;
                --secondary-blue: #3b82f6;
                --accent-green: #4ade80;
                --accent-yellow: #fbbf24;
                --accent-orange: #fb923c;
                --accent-purple: #a78bfa;
                --glass-bg: rgba(15, 23, 42, 0.8);
                --border-color: rgba(34, 211, 238, 0.3);
            }

            body {
                background-color: var(--bg-color);
                color: #f8fafc;
                font-family: "Segoe UI", system-ui, sans-serif;
                overflow-x: hidden;
            }

            .bg-grid {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background-image:
                    linear-gradient(var(--border-color) 1px, transparent 1px),
                    linear-gradient(
                        90deg,
                        var(--border-color) 1px,
                        transparent 1px
                    );
                background-size: 50px 50px;
                z-index: -1;
                mask-image: radial-gradient(
                    circle at 50% 50%,
                    black,
                    transparent 80%
                );
                opacity: 0.15;
            }

            .glass-card {
                border: 1px solid var(--border-color);
                background: var(--glass-bg);
                backdrop-filter: blur(10px);
                border-radius: 12px;
                transition: all 0.3s ease;
            }

            .glass-card:hover {
                border-color: var(--primary-cyan);
                box-shadow: 0 0 20px rgba(34, 211, 238, 0.15);
                transform: translateY(-2px);
            }

            .cyan-text { color: var(--primary-cyan); }
            .green-text { color: var(--accent-green); }
            .yellow-text { color: var(--accent-yellow); }
            .orange-text { color: var(--accent-orange); }
            .purple-text { color: var(--accent-purple); }
            .blue-text { color: var(--secondary-blue); }

            .tag {
                display: inline-block;
                padding: 2px 10px;
                border-radius: 20px;
                font-size: 0.7rem;
                font-weight: 600;
                letter-spacing: 0.08em;
                text-transform: uppercase;
            }

            .divider {
                height: 1px;
                background: linear-gradient(
                    to right,
                    transparent,
                    var(--border-color),
                    transparent
                );
            }

            h1, h2, h3 { font-weight: 700; }

            .glow-cyan { text-shadow: 0 0 20px rgba(34, 211, 238, 0.5); }

            .nav-link {
                color: #94a3b8;
                font-size: 0.85rem;
                transition: color 0.2s;
            }
            .nav-link:hover { color: var(--primary-cyan); }

            .card-cyan {
                border-color: rgba(34, 211, 238, 0.4);
            }
            .card-cyan:hover {
                border-color: var(--primary-cyan);
                box-shadow: 0 0 20px rgba(34, 211, 238, 0.2);
            }
            .card-yellow {
                border-color: rgba(251, 191, 36, 0.4);
            }
            .card-yellow:hover {
                border-color: var(--accent-yellow);
                box-shadow: 0 0 20px rgba(251, 191, 36, 0.15);
            }

            .sub-card {
                background: rgba(15, 23, 42, 0.6);
                border: 1px solid rgba(255, 255, 255, 0.07);
                border-radius: 8px;
            }

            .step-number {
                width: 2.5rem;
                height: 2.5rem;
                border-radius: 50%;
                background: rgba(34, 211, 238, 0.1);
                border: 1px solid rgba(34, 211, 238, 0.4);
                display: flex;
                align-items: center;
                justify-content: center;
                font-family: "Courier New", monospace;
                font-weight: 700;
                color: var(--primary-cyan);
                flex-shrink: 0;
            }

            table { width: 100%; border-collapse: collapse; }
            th {
                text-align: left;
                padding: 10px 14px;
                font-size: 0.75rem;
                text-transform: uppercase;
                letter-spacing: 0.1em;
                color: #94a3b8;
                border-bottom: 1px solid rgba(34, 211, 238, 0.2);
            }
            td {
                padding: 10px 14px;
                border-bottom: 1px solid rgba(255, 255, 255, 0.05);
                font-size: 0.875rem;
                vertical-align: middle;
            }
            tr:last-child td { border-bottom: none; }
            tr:hover td { background: rgba(34, 211, 238, 0.03); }

            .faq-card {
                border: 1px solid rgba(255, 255, 255, 0.08);
                background: rgba(15, 23, 42, 0.6);
                border-radius: 10px;
                transition: all 0.3s;
            }
            .faq-card:hover {
                border-color: rgba(34, 211, 238, 0.3);
            }
        </style>
    </head>
