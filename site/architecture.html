    <style>html,body{background:#020617;color:#f8fafc}</style>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #020617;
            --primary-cyan: #22d3ee;
            --secondary-blue: #3b82f6;
            --accent-orange: #fb923c;
            --glass-bg: rgba(15, 23, 42, 0.8);
            --border-color: rgba(34, 211, 238, 0.3);
        }

        body {
            background-color: var(--bg-color);
            color: #f8fafc;
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow-x: hidden;
        }

        /* 科技感背景网格 */
        .bg-grid {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(var(--border-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--border-color) 1px, transparent 1px);
            background-size: 50px 50px;
            perspective: 1000px;
            z-index: -1;
            mask-image: radial-gradient(circle at 50% 50%, black, transparent 80%);
            opacity: 0.2;
        }

        /* 连线流光效果 */
        .flow-line {
            position: absolute;
            background: linear-gradient(to bottom, transparent, var(--primary-cyan), transparent);
            width: 2px;
            height: 100px;
            z-index: 0;
            animation: flow 3s infinite linear;
        }

        @keyframes flow {
            0% { transform: translateY(-100%); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(100%); opacity: 0; }
        }

        .layer-container {
            border: 1px solid var(--border-color);
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            transition: all 0.3s ease;
            position: relative;
        }

        .layer-container:hover {
            border-color: var(--primary-cyan);
            box-shadow: 0 0 20px rgba(34, 211, 238, 0.2);
            transform: translateY(-2px);
        }

        .node-card {
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 0.75rem;
            text-align: center;
            transition: all 0.2s;
            cursor: pointer;
        }

        .node-card:hover {
            background: var(--secondary-blue);
            color: white;
            box-shadow: 0 0 15px var(--secondary-blue);
            transform: scale(1.05);
        }

        .title-gradient {
            background: linear-gradient(90deg, var(--primary-cyan), var(--secondary-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        .connector-dot {
            width: 8px;
            height: 8px;
            background: var(--primary-cyan);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--primary-cyan);
            position: absolute;
        }
    </style>
</head>
