[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.25"
extra_output = ["storageLayout"]
optimizer_runs = 20000
verbosity = 1
via_ir = true
remappings = [
    "openzeppelin-contracts/=lib/openzeppelin-contracts/",
    "forge-std/=lib/forge-std/src/",
    "@openzeppelin/=lib/openzeppelin-contracts/"
]

[profile.ci]
verbosity = 4

[lint]
exclude_lints = ["mixed-case-variable", "mixed-case-function", "unaliased-plain-import", "screaming-snake-case-immutable", "incorrect-shift", "pascal-case-struct"]
ignore = ["script/**/*", "test/**/*"]

[rpc_endpoints]
mainnet = "${RPC_URL_MAINNET}"
sepolia = "${SEPOLIA_RPC_URL}"

[etherscan]
mainnet = {key = "${ETHERSCAN_API_KEY}"}
sepolia = {key = "${ETHERSCAN_API_KEY}", chain = 11155111}
